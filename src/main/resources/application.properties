spring.application.name=screenmatch-frases
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# Se a variĂ¡vel DB_HOST nĂ£o existir (rodando local), assume 'localhost'
# Se rodar dentro do Docker completo, o Spring receberĂ¡ 'db' ou 'postgres' como host
# Database
app.database.host=${DB_HOST:localhost}
app.database.port=${DB_PORT:5432}
app.database.name=${DB_NAME}
app.database.username=${DB_USERNAME}
app.database.password=${DB_PASSWORD}

# DataSource
spring.datasource.url=jdbc:postgresql://${app.database.host}:${app.database.port}/${app.database.name}
spring.datasource.username=${app.database.username}
spring.datasource.password=${app.database.password}